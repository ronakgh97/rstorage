[package]
name = "r-storage"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "r-storage"
path = "src/bin/server.rs"

[[bin]]
name = "r-storage-cli"
path = "src/bin/client.rs"

[lib]
name = "r_storage"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1.50.0", features = ["full"] }
tokio-util = { version = "0.7.18", features = ["io"] }
clap = { version = "4.5.60", features = ["derive"] }
axum = "0.8.8"
reqwest = { version = "0.13.2", features = ["stream", "json"] }
# multer = "3.1.0"
futures-util = "0.3.32"
anyhow = "1.0.102"
chrono = "0.4.44"
colored = "3.1.1"
dirs = "6.0.0"
dotenv = "0.15.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
dashmap = "6.1.0"
sha2 = "0.10.9"
lazy_static = "1.5.0"
uuid = { version = "1.22.0", features = ["v4"] }
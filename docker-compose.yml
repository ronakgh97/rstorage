services:
  rdrive:
    build:
      context: .
      dockerfile: Dockerfile
    image: rdrive:latest
    container_name: rdrive-server
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    volumes:
      - rdrive-storage:/home/rdrive/.rdrive/storage
    environment:
      - LOG_LEVEL=debug
      - PORT=3000
    command: [ "serve" ]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "test", "-f", "/app/rds" ]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - rdrive-network


volumes:
  rdrive-storage:
    driver: local

networks:
  rdrive-network:
    driver: bridge